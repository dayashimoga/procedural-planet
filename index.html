<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Procedural Planet Renderer | QuickUtils</title>
    <meta name="keywords" content="QuickUtils, procedural, planet, code, design, productivity, online tools">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Procedural Planet Renderer | QuickUtils">
    <meta property="og:description" content="Complex WebGL 3D planet generator with procedural biomes.">
    <meta property="og:url" content="https://planets.quickutils.top/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Procedural Planet Renderer",
    "url": "https://planets.quickutils.top/",
    "description": "Complex WebGL 3D planet generator with procedural biomes.",
    "applicationCategory": "BrowserApplication",
    "operatingSystem": "All",
    "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "USD"
    }
}
</script>
    <link rel="canonical" href="https://planets.quickutils.top/">
    <meta name="description" content="Complex WebGL 3D planet generator with procedural biomes.">
    <link rel="stylesheet" href="../../quickutils-core.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <meta name="theme-color" content="#ffffff">
</head>
<body class="planet-bg">
    <nav class="navbar glass-nav transparent-nav">
        <div class="container nav-inner px-4">
            <a href="../../index.html" class="brand holo-text">🌍 Procedural Planets</a>
        </div>
    </nav>

    <div id="canvasWrap"></div>

    <div class="planet-controls glass-card p-4">
        <h3 class="mb-4 text-neon-green">Planet Generator</h3>
        
        <button class="btn btn-primary w-100 mb-4 glow-btn" id="btnRandomize">Randomize Seed 🎲</button>

        <label class="form-label text-xs d-flex justify-content-between">
            Water Level <span id="valWater">0.5</span>
        </label>
        <input type="range" class="form-range mb-3" id="optWater" min="0" max="1" step="0.05" value="0.5">

        <label class="form-label text-xs d-flex justify-content-between">
            Temperature <span id="valTemp">0.5</span>
        </label>
        <input type="range" class="form-range mb-3" id="optTemp" min="0" max="1" step="0.05" value="0.5">

        <label class="form-label text-xs d-flex justify-content-between">
            Atmosphere Density <span id="valAtmo">0.3</span>
        </label>
        <input type="range" class="form-range mb-3" id="optAtmo" min="0" max="1" step="0.05" value="0.3">

        <h4 class="text-xs text-muted mt-4 border-bottom pb-2">Biome Distribution</h4>
        <div class="d-flex justify-content-between mt-2 text-xs">
            <span style="color:#3b82f6">Oceans</span>
            <span style="color:#22c55e">Forests</span>
            <span style="color:#eab308">Deserts</span>
            <span style="color:#f8fafc">Ice</span>
        </div>
        <div class="progress mt-1" style="height: 6px;">
            <div id="barWater" class="progress-bar" style="width: 50%; background:#3b82f6;"></div>
            <div id="barForest" class="progress-bar" style="width: 25%; background:#22c55e;"></div>
            <div id="barDesert" class="progress-bar" style="width: 15%; background:#eab308;"></div>
            <div id="barIce" class="progress-bar" style="width: 10%; background:#f8fafc;"></div>
        </div>
    </div>

    <script src="../../quickutils-core.js"></script>
    <script src="script.js"></script>
</body>
</html>
